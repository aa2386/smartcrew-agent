spring:
  application:
    name: smartcrew-agent
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null

server:
  port: 8085

mybatis-plus:
  type-aliases-package: com.smartcrew.agent.api
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

smartcrew:
  name: smartcrew-agent
  version: 0.0.1-SNAPSHOT
  api:
    v1:
      enabled: true
    web:
      enabled: true
    admin:
      enabled: true
  auth:
    mode: LOCAL_JWT
    require-web-login: true
    require-admin-login: true
    token-secret: ${SMARTCREW_TOKEN_SECRET:}
    token-expire-minutes: 720
    bootstrap-admin:
      enabled: ${SMARTCREW_BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${SMARTCREW_BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${SMARTCREW_BOOTSTRAP_ADMIN_PASSWORD:}
      display-name: ${SMARTCREW_BOOTSTRAP_ADMIN_DISPLAY_NAME:系统管理员}
  cors:
    allowed-origins:
      - http://localhost:8080
      - http://localhost:8081
    allow-credentials: true
    max-age: 3600
  llm:
    enabled: true
    provider: dashscope
    model: qwen-plus
  rag:
    enabled: true
    embedding:
      provider: dashscope
      model: text-embedding-v3
    vector-store:
      type: chroma
      chroma:
        base-url: http://localhost:8000
        timeout-seconds: 60
    document:
      upload-path: ./uploads/knowledge
      splitter:
        type: paragraph
        max-chunk-size: 200
        overlap-size: 50
  tools:
    enabled:
      basic: true
      file: true
      image-search: true
      plantuml: true
      web-search: true
      web-page: true
      document: true
      terminal: false
  tooling:
    file:
      save-dir: ./tmp
