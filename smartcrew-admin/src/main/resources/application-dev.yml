spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smartcrew_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_DB_USERNAME:root}
    password: ${MYSQL_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

smartcrew:
  llm:
    api-key: ${DASHSCOPE_API_KEY:}
  tooling:
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: https://api.tavily.com/search
    pexels:
      api-key: ${PEXELS_API_KEY:}
      api-url: https://api.pexels.com/v1/search
