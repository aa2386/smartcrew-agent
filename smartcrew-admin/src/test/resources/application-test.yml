spring:
  datasource:
    url: jdbc:h2:mem:smartcrew;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/test-schema.sql

smartcrew:
  tools:
    enabled:
      terminal: false
  tooling:
    file:
      save-dir: ./target/tmp
