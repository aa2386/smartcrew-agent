spring:
  datasource:
    url: jdbc:h2:mem:smartcrew;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/test-schema.sql

smartcrew:
  llm:
    api-key: ${DASHSCOPE_API_KEY:}
  tooling:
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: https://api.tavily.com/search
    pexels:
      api-key: ${PEXELS_API_KEY:}
      api-url: https://api.pexels.com/v1/search
